---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <nav class="post-toc" aria-label="Table of contents">
    <p class="post-toc-title">On this page</p>
    <ul></ul>
  </nav>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>

<script>
(function () {
  var toc = document.querySelector('.post-toc');
  var entry = document.querySelector('.entry');
  if (!toc || !entry) return;

  var headings = entry.querySelectorAll('h2');
  if (headings.length < 2) { toc.remove(); return; }

  var list = toc.querySelector('ul');
  var links = [];

  // A "Top" entry for the heading-less intro. Anchored to the article title.
  var title = document.querySelector('.post > h1');
  var spyTargets = [];
  if (title) {
    if (!title.id) title.id = 'top';
    var topLi = document.createElement('li');
    var topA = document.createElement('a');
    topA.href = '#' + title.id;
    topA.textContent = 'Top';
    topLi.appendChild(topA);
    list.appendChild(topLi);
    links.push(topA);
    spyTargets.push(title);
  }

  headings.forEach(function (h) {
    if (!h.id) {
      h.id = h.textContent.trim().toLowerCase().replace(/[^\w]+/g, '-');
    }
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    li.appendChild(a);
    list.appendChild(li);
    links.push(a);
    spyTargets.push(h);
  });

  // Scroll-spy: highlight the section currently in view.
  var byId = {};
  links.forEach(function (a) { byId[a.getAttribute('href').slice(1)] = a; });

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        links.forEach(function (a) { a.classList.remove('active'); });
        var active = byId[e.target.id];
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '0px 0px -75% 0px', threshold: 0 });

  spyTargets.forEach(function (t) { observer.observe(t); });
})();
</script>
